[tools]

# Go
go = "1.26.1"
golines = "latest"
"go:github.com/spf13/cobra-cli" = "latest"
"go:golang.org/x/tools/cmd/goimports" = "latest"
"go:github.com/vektra/mockery/v2" = "latest"
"go:golang.org/x/tools/cmd/godoc" = "latest"


# Repo utilities
# Formatters and linters
markdownlint-cli2 = "0.18.1"
yamlfmt = "0.20.0"
yamllint = "1.37.1"
prettier = "3.7.4"
"github:donaldgifford/makefmt" = "latest"
checkmake = "latest"
git-cliff = "latest"

# tools
yq = "4.48.1"
jq = "latest"
"github:donaldgifford/docz" = "latest"


# Database migrations (IMPL-0002 RD1).
# Release-binary install with the postgres driver precompiled. The
# `rfc-api migrate` subcommand uses the golang-migrate library
# directly and does not depend on this CLI; the CLI is here for
# ad-hoc operator inspection (`migrate -source ... status`).
"github:golang-migrate/migrate" = { version = "v4.18.1", exe = "migrate" }

# Release tools
golangci-lint = "2.11.4"

# Security
syft = "latest"
"go:golang.org/x/vuln/cmd/govulncheck" = "latest"

# Compliance
"go:github.com/google/go-licenses" = "latest"
