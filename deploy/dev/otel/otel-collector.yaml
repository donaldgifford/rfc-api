---
# OpenTelemetry Collector config for local dev.
#
# Receives OTLP from rfc-api (host-run binary) on 4317 (gRPC) + 4318 (HTTP).
# Fans out:
#   traces  -> jaeger (OTLP on :4317, internal to compose network)
#   metrics -> prometheus (remote_write on :9090 via otel receiver)
#   logs    -> loki (loki exporter on :3100)
#
# rfc-api points at this collector via OTEL_EXPORTER_OTLP_ENDPOINT.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 512
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 20

exporters:
  # Jaeger now ingests OTLP directly; no separate jaeger exporter needed.
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Loki HTTP push API.
  loki:
    endpoint: http://loki:3100/loki/api/v1/push

  # Prometheus remote_write. Prometheus in this stack uses pull-based scrape
  # against the rfc-api admin port; this exporter is here for completeness
  # so runtime metrics emitted by the SDK (histograms, runtime gauges) have
  # somewhere to go without requiring a Prometheus remote_write receiver on
  # the Prometheus side.
  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
    tls:
      insecure: true

service:
  telemetry:
    logs:
      level: info
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/jaeger]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheusremotewrite]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [loki]
