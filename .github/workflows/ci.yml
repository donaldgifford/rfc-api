---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  labeler:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    name: Label PR
    steps:
      - name: Checkout code
        uses: actions/labeler@v6
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: make test-coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: donaldgifford/
        continue-on-error: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run govulncheck
        uses: donaldgifford/govulncheck-action@v1
        with:
          go-version-file: go.mod
          go-package: ./...

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"

  schema:
    name: DB Schema
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: rfcapi
          POSTGRES_PASSWORD: rfcapi
          POSTGRES_DB: rfcapi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rfcapi"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://rfcapi:rfcapi@localhost:5432/rfcapi?sslmode=disable
      RFC_API_WEBHOOK_SECRET: ci-only
      MEILI_MASTER_KEY: ci-only
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Apply the embedded migrations via the real subcommand, then
      # reverse them, then re-apply. Catches any forward-only migration
      # that isn't also down-reversible in dev, and any migration that
      # isn't idempotent on re-run.
      - name: Migrate up (cold)
        run: go run ./cmd/rfc-api migrate

      - name: Migrate up (idempotent re-run)
        run: go run ./cmd/rfc-api migrate

      - name: Install golang-migrate CLI for rollback smoke
        run: |
          curl -fsSL https://github.com/golang-migrate/migrate/releases/download/v4.18.1/migrate.linux-amd64.tar.gz \
            | tar xz
          sudo mv migrate /usr/local/bin/migrate

      - name: Migrate down (verify reversibility)
        run: migrate -path db/migrations -database "$DATABASE_URL" down -all

      - name: Migrate up again (verify re-forward)
        run: go run ./cmd/rfc-api migrate

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: rfcapi
          POSTGRES_PASSWORD: rfcapi
          POSTGRES_DB: rfcapi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rfcapi"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      meilisearch:
        image: getmeili/meilisearch:v1.20
        env:
          MEILI_MASTER_KEY: ci-only
          MEILI_NO_ANALYTICS: "true"
          MEILI_ENV: development
        ports:
          - 7700:7700
        options: >-
          --health-cmd "curl -sf http://localhost:7700/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://rfcapi:rfcapi@localhost:5432/rfcapi?sslmode=disable
      RFC_API_WEBHOOK_SECRET: ci-only
      MEILI_URL: http://localhost:7700
      MEILI_MASTER_KEY: ci-only
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # The integration suite's TestMain runs migrations itself, so no
      # separate migrate step is required.
      - name: Run integration tests
        run: make test-integration

      - name: Run Meilisearch integration tests
        run: make test-integration-search

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Verify builds for all platforms
        uses: goreleaser/goreleaser-action@v7.1.0
        with:
          version: "~> v2"
          args: build --snapshot --clean

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dev image
        if: github.event_name == 'pull_request'
        uses: docker/bake-action@v7
        with:
          targets: ci
          source: .
          files: docker-bake.hcl
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
            *.output=type=registry

      - name: Build multi-arch images (post-merge validation)
        if: github.event_name == 'push'
        uses: docker/bake-action@v7
        with:
          targets: ci
          source: .
          files: docker-bake.hcl
          set: |-
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
